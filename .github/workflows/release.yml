name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without v (e.g. 1.0.1)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "${{ github.event.inputs.version }}".TrimStart('v')
          } else {
            $v = "${{ github.ref_name }}".TrimStart('v')
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $v"

      - name: Publish portable launcher
        shell: pwsh
        run: |
          $out = Join-Path $env:RUNNER_TEMP "portable"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          dotnet publish ZLauncher.csproj -c Release -r win-x64 --self-contained true `
            -o $out `
            /p:PublishSingleFile=false `
            /p:Version=${{ steps.ver.outputs.version }} `
            /p:DebugType=None /p:DebugSymbols=false --nologo
          # zip
          $zip = Join-Path $env:RUNNER_TEMP "ZLauncher-Portable.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path (Join-Path $out "*") -DestinationPath $zip -Force
          "portable_zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "portable_dir=$out" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        id: pub

      - name: Pack installer payload + publish Setup
        shell: pwsh
        run: |
          $portable = "${{ steps.pub.outputs.portable_dir }}"
          $installer = Join-Path $pwd "Installer"
          if (-not (Test-Path $installer)) { $installer = Join-Path $pwd "ZLauncher.Installer" }

          $payloadDir = Join-Path $installer "payload"
          New-Item -ItemType Directory -Force -Path $payloadDir | Out-Null
          $payloadZip = Join-Path $payloadDir "payload.zip"
          if (Test-Path $payloadZip) { Remove-Item $payloadZip -Force }
          Compress-Archive -Path (Join-Path $portable "*") -DestinationPath $payloadZip -Force

          $setupOut = Join-Path $env:RUNNER_TEMP "setup"
          New-Item -ItemType Directory -Force -Path $setupOut | Out-Null
          dotnet publish (Join-Path $installer "ZLauncher.Installer.csproj") `
            -c Release -r win-x64 --self-contained true -o $setupOut `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true `
            /p:Version=${{ steps.ver.outputs.version }} `
            /p:DebugType=None /p:DebugSymbols=false --nologo

          $setupExe = Join-Path $setupOut "ZLauncher.Setup.exe"
          if (-not (Test-Path $setupExe)) { throw "Setup exe not found" }
          "setup_exe=$setupExe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        id: setup

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: ZLauncher v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.pub.outputs.portable_zip }}
            ${{ steps.setup.outputs.setup_exe }}
